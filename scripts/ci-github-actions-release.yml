# .github/workflows/release.yml  (template — move here when CI is ready)
#
# Triggered on git tag v*. Produces a signed, notarized, R2-published DMG
# and updates latest.json in one shot.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   # TODO: set secret MAC_CERT_BASE64        — base64 of the .p12 export of the Developer ID cert
#   # TODO: set secret MAC_CERT_PASSWORD      — password used during .p12 export
#   # TODO: set secret APPLE_ID               — admin@yourcompany.com
#   # TODO: set secret APPLE_TEAM_ID          — 10-char team id (from spec §1.2)
#   # TODO: set secret APPLE_APP_PASSWORD     — app-specific password for notarytool
#   # TODO: set secret TAURI_PRIVATE_KEY      — Ed25519 updater private key contents
#   # TODO: set secret TAURI_KEY_PASSWORD     — password for the updater key
#   # TODO: set secret R2_ACCESS_KEY_ID       — Cloudflare R2 access key
#   # TODO: set secret R2_SECRET_ACCESS_KEY   — Cloudflare R2 secret
#   # TODO: set secret R2_ACCOUNT_ID          — Cloudflare account id
#
# After you wire these in: move this file to .github/workflows/release.yml
# and `git push --tags` to trigger.

name: Release

on:
  push:
    tags:
      - "v*"

# Cancel older runs of the same tag if a newer one lands.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # needed for creating a GitHub Release attachment

jobs:
  build:
    name: Build + sign + notarize + publish
    runs-on: macos-14   # Apple Silicon runner

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: maxbridge-releases
      PUBLIC_HOST: releases.maxbridge.ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "version=$V" >>"$GITHUB_OUTPUT"
          echo "Building Maxbridge $V"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install npm deps
        run: npm ci

      - name: Import Apple Developer ID cert into a temp keychain
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"

          echo "$MAC_CERT_BASE64" | base64 --decode >"$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"

          security import "$CERT_PATH" \
            -P "$MAC_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"

          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Register notarytool credentials
        shell: bash
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "maxbridge-notarytool" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build Node runtime + server bundle
        run: bash scripts/build-bundle.sh

      - name: Tauri build (produces signed .dmg)
        run: npx tauri build --target aarch64-apple-darwin

      - name: Notarize + staple
        run: bash scripts/sign-and-notarize.sh

      - name: Verify release artifacts (spec §9)
        run: bash scripts/verify-release.sh

      - name: Publish to Cloudflare R2 + update latest.json
        run: bash scripts/publish-release.sh "${{ steps.version.outputs.version }}"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maxbridge-${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/**/bundle/dmg/Maxbridge_*.dmg
            src-tauri/target/**/bundle/dmg/Maxbridge_*.dmg.sig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Maxbridge ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            src-tauri/target/**/bundle/dmg/Maxbridge_*.dmg
            src-tauri/target/**/bundle/dmg/Maxbridge_*.dmg.sig
